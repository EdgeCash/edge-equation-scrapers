name: MLB Daily Spreadsheet

# Builds today's MLB spreadsheet (backfill + projections + Kelly +
# backtest + market odds) and commits the new files to main, which
# triggers an automatic Vercel redeploy.
on:
  schedule:
    # 13:30 UTC = 8:30 AM Central / 9:30 AM Eastern. Late enough that
    # yesterday's slate is final on statsapi.mlb.com, early enough to
    # publish today's projections before first pitch.
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Defaults to today (ET)."
        required: false
        default: ""
      skip_odds:
        description: "Skip odds fetch (Kelly falls back to -110)."
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "edge-equation-bot"
          git config user.email "bot@edge-equation.local"

      - name: Build daily spreadsheet
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.skip_odds }}" = "true" ]; then
            ARGS="$ARGS --no-odds"
          fi
          python -m exporters.mlb.daily_spreadsheet $ARGS

      - name: Commit and push outputs
        run: |
          git add public/data/mlb/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          DATE_TAG=$(date -u +"%Y-%m-%d")
          git commit -m "Daily MLB spreadsheet — $DATE_TAG"
          git push
