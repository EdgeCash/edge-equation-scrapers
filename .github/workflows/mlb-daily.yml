name: MLB Daily Spreadsheet

# Builds today's MLB spreadsheet (backfill + projections + Kelly +
# backtest + market odds) and commits the new files to main, which
# triggers an automatic Vercel redeploy.
on:
  schedule:
    # 15:00 UTC = 11:00 AM ET during DST (covers entire MLB regular
    # season Mar–Oct). Matches the BRAND_GUIDE operational standard:
    # "Daily card published by 11:00 AM ET" — gives lineups enough time
    # to set before publication. During the brief late-October window
    # after DST ends this fires at 10:00 AM ET, still well within spec.
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Defaults to today (ET)."
        required: false
        default: ""
      skip_odds:
        description: "Skip odds fetch (Kelly falls back to -110)."
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "edge-equation-bot"
          git config user.email "bot@edge-equation.local"

      - name: Build daily spreadsheet
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.skip_odds }}" = "true" ]; then
            ARGS="$ARGS --no-odds"
          fi
          python -m exporters.mlb.daily_spreadsheet $ARGS

      - name: Build experimental player props (sandbox only)
        # Runs after the main build. Outputs land in
        # data/experimental/mlb-props/ — NOT under public/, so the
        # website cannot surface them. Per BRAND_GUIDE Sandbox
        # protocol: no prop ships to the daily card until it passes
        # the same gate as game-level markets. We still generate
        # daily so we accumulate evidence to backtest against.
        # `|| true` so a props failure doesn't block the main build.
        run: |
          python run_mlb_props_experimental.py || true

      - name: Commit and push outputs
        run: |
          git add public/data/mlb/ data/experimental/mlb-props/ || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          DATE_TAG=$(date -u +"%Y-%m-%d")
          git commit -m "Daily MLB spreadsheet — $DATE_TAG"
          git push
